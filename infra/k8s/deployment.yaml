apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-aiops-backend
  namespace: default
  labels:
    app.kubernetes.io/name: mcp-aiops-backend
    app.kubernetes.io/part-of: aiops-platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-aiops-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-aiops-backend
        app.kubernetes.io/part-of: aiops-platform
    spec:
      serviceAccountName: mcp-aiops-backend
      containers:
        - name: api
          image: REPLACE_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: mcp-aiops-backend-config
            - secretRef:
                name: mcp-aiops-backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
