apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-aiops-backend
  namespace: default
  labels:
    app.kubernetes.io/name: mcp-aiops-backend
    app.kubernetes.io/part-of: aiops-platform
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-aiops-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-aiops-backend
        app.kubernetes.io/part-of: aiops-platform
    spec:
      serviceAccountName: mcp-aiops-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: sync-topology-knowledge
          image: public.ecr.aws/aws-cli/aws-cli:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              if [ -z "${TOPOLOGY_KNOWLEDGE_S3_URI:-}" ]; then
                echo "TOPOLOGY_KNOWLEDGE_S3_URI is empty; skipping topology sync."
                exit 0
              fi
              aws s3 sync "${TOPOLOGY_KNOWLEDGE_S3_URI}" /topology \
                --exclude "*" \
                --include "*topology-snapshot-*.md" \
                --only-show-errors
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: mcp-aiops-backend-config
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: topology-knowledge
              mountPath: /topology
            - name: tmp
              mountPath: /tmp
      containers:
        - name: api
          image: REPLACE_IMAGE
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: mcp-aiops-backend-config
            - secretRef:
                name: mcp-aiops-backend-secret
          env:
            - name: RCA_JOB_RUNNER_IMAGE
              value: REPLACE_IMAGE
            - name: RCA_JOB_RUNNER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: topology-knowledge
              mountPath: /app/topology-knowledge
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: topology-knowledge
          emptyDir: {}
        - name: tmp
          emptyDir: {}
