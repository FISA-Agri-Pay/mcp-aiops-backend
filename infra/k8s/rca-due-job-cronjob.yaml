apiVersion: batch/v1
kind: CronJob
metadata:
  name: mcp-aiops-rca-due-job-runner
  namespace: default
  labels:
    app.kubernetes.io/name: mcp-aiops-backend
    app.kubernetes.io/part-of: aiops-platform
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mcp-aiops-rca-due-job-runner
            app.kubernetes.io/part-of: aiops-platform
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: runner
              image: REPLACE_IMAGE
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command:
                - python
                - -c
                - |
                  import urllib.request

                  url = "http://mcp-aiops-backend.default.svc.cluster.local/rca/jobs/run-due?limit=20"
                  request = urllib.request.Request(url, method="POST")
                  with urllib.request.urlopen(request, timeout=30) as response:
                      print(response.read().decode("utf-8"))
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
