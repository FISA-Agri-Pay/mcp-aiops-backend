name: Deploy MCP backend to EKS

on:
  push:
    branches:
      - main
      - feat/#47-mcp-tool-infra-eks-pipeline
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'ap-northeast-2' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY || 'kkpp/mcp-aiops-backend' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || secrets.EKS_CLUSTER_NAME || 'kkpp-eks' }}
  K8S_NAMESPACE: default
  K8S_DEPLOYMENT: ${{ vars.K8S_DEPLOYMENT || 'mcp-aiops-backend' }}
  K8S_SERVICE: ${{ vars.K8S_SERVICE || 'mcp-aiops-backend' }}
  K8S_SECRET_NAME: ${{ vars.K8S_SECRET_NAME || 'mcp-aiops-backend-secret' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kkpp
          POSTGRES_PASSWORD: kkpp
          POSTGRES_DB: kkpp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kkpp -d kkpp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://kkpp:kkpp@localhost:5432/kkpp
          RUN_TEST_SEEDS: "true"
        run: |
          set +e
          python -m pytest -ra -vv 2>&1 | tee pytest.log
          status="${PIPESTATUS[0]}"
          if [ "${status}" -ne 0 ]; then
            {
              echo "### Pytest failure tail"
              echo '```text'
              tail -n 120 pytest.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            message="$(tail -n 40 pytest.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Pytest failure::${message}"
            exit "${status}"
          fi

  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment inputs
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPS_REPORT_EMAIL_RECIPIENTS: ${{ secrets.OPS_REPORT_EMAIL_RECIPIENTS }}
        run: |
          test -n "${AWS_ROLE_TO_ASSUME}" || { echo "AWS_ROLE_TO_ASSUME secret is required."; exit 1; }
          test -n "${DATABASE_URL}" || { echo "DATABASE_URL secret is required."; exit 1; }
          test -n "${LLM_API_KEY}" || { echo "LLM_API_KEY secret is required for external Groq LLM."; exit 1; }
          test -n "${SMTP_HOST}" || { echo "SMTP_HOST secret is required."; exit 1; }
          test -n "${SMTP_USERNAME}" || { echo "SMTP_USERNAME secret is required."; exit 1; }
          test -n "${SMTP_PASSWORD}" || { echo "SMTP_PASSWORD secret is required."; exit 1; }
          test -n "${SMTP_FROM}" || { echo "SMTP_FROM secret is required."; exit 1; }
          test -n "${OPS_REPORT_EMAIL_RECIPIENTS}" || { echo "OPS_REPORT_EMAIL_RECIPIENTS secret is required."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Apply base manifests
        run: |
          kubectl apply -f infra/k8s/serviceaccount.yaml
          kubectl apply -f infra/k8s/rbac.yaml
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/service.yaml

      - name: Apply runtime secret
        run: |
          kubectl create secret generic "${K8S_SECRET_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=LLM_API_KEY="${LLM_API_KEY}" \
            --from-literal=ELASTICSEARCH_USERNAME="${ELASTICSEARCH_USERNAME}" \
            --from-literal=ELASTICSEARCH_PASSWORD="${ELASTICSEARCH_PASSWORD}" \
            --from-literal=SMTP_HOST="${SMTP_HOST}" \
            --from-literal=SMTP_USERNAME="${SMTP_USERNAME}" \
            --from-literal=SMTP_PASSWORD="${SMTP_PASSWORD}" \
            --from-literal=SMTP_FROM="${SMTP_FROM}" \
            --from-literal=OPS_REPORT_EMAIL_RECIPIENTS="${OPS_REPORT_EMAIL_RECIPIENTS}" \
            --from-literal=RCA_EMAIL_RECIPIENTS="${RCA_EMAIL_RECIPIENTS}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ELASTICSEARCH_USERNAME: ${{ secrets.ELASTICSEARCH_USERNAME }}
          ELASTICSEARCH_PASSWORD: ${{ secrets.ELASTICSEARCH_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPS_REPORT_EMAIL_RECIPIENTS: ${{ secrets.OPS_REPORT_EMAIL_RECIPIENTS }}
          RCA_EMAIL_RECIPIENTS: ${{ secrets.RCA_EMAIL_RECIPIENTS }}

      - name: Deploy image
        run: |
          sed "s|REPLACE_IMAGE|${IMAGE_URI}|g" infra/k8s/deployment.yaml | kubectl apply -f -
          sed "s|REPLACE_IMAGE|${IMAGE_URI}|g" infra/k8s/rca-due-job-cronjob.yaml | kubectl apply -f -
          kubectl rollout status "deployment/${K8S_DEPLOYMENT}" \
            --namespace "${K8S_NAMESPACE}" \
            --timeout=180s
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Smoke test service
        run: |
          kubectl run mcp-aiops-smoke-test \
            --namespace "${K8S_NAMESPACE}" \
            --image=curlimages/curl:8.8.0 \
            --restart=Never \
            --rm -i \
            --command -- curl -fsS "http://${K8S_SERVICE}/health"
