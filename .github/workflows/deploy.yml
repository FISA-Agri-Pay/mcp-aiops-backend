name: Deploy MCP backend to EKS

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN || secrets.AWS_ROLE_TO_ASSUME }}
  AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME || secrets.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || secrets.K8S_NAMESPACE || 'aiops' }}
  K8S_DEPLOYMENT: ${{ vars.K8S_DEPLOYMENT || 'mcp-aiops-backend' }}
  K8S_SERVICE: ${{ vars.K8S_SERVICE || 'mcp-aiops-backend' }}
  K8S_SECRET_NAME: ${{ vars.K8S_SECRET_NAME || 'mcp-aiops-backend-secret' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kkpp
          POSTGRES_PASSWORD: kkpp
          POSTGRES_DB: kkpp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kkpp -d kkpp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Initialize test database
        env:
          DATABASE_URL: postgresql+psycopg://kkpp:kkpp@localhost:5432/kkpp
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          import psycopg

          database_url = os.environ["DATABASE_URL"].replace(
              "postgresql+psycopg://",
              "postgresql://",
              1,
          )
          schema_sql = (
              "CREATE EXTENSION IF NOT EXISTS pgcrypto;\n"
              + Path("tests/seed/ci_schema.sql").read_text(encoding="utf-8")
          )
          with psycopg.connect(database_url) as connection:
              connection.execute(schema_sql)
          PY

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://kkpp:kkpp@localhost:5432/kkpp
          RUN_TEST_SEEDS: "true"
        run: |
          set +e
          python -m pytest -ra -vv 2>&1 | tee pytest.log
          status="${PIPESTATUS[0]}"
          if [ "${status}" -ne 0 ]; then
            {
              echo "### Pytest failure tail"
              echo '```text'
              tail -n 120 pytest.log
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            message="$(tail -n 40 pytest.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=Pytest failure::${message}"
            exit "${status}"
          fi

  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate deployment inputs
        env:
          AWS_ROLE_ARN: ${{ env.AWS_ROLE_ARN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          EKS_CLUSTER_NAME: ${{ env.EKS_CLUSTER_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPS_REPORT_EMAIL_RECIPIENTS: ${{ secrets.OPS_REPORT_EMAIL_RECIPIENTS }}
          RCA_SLACK_WEBHOOK_URL: ${{ secrets.RCA_SLACK_WEBHOOK_URL }}
        run: |
          test -n "${AWS_ROLE_ARN}" || { echo "AWS_ROLE_ARN variable/secret or AWS_ROLE_TO_ASSUME secret is required."; exit 1; }
          case "${AWS_ROLE_ARN}" in
            arn:aws:iam::*:role/*) ;;
            *) echo "AWS_ROLE_ARN must be a full IAM Role ARN, not just a role name."; exit 1 ;;
          esac
          test -n "${AWS_REGION}" || { echo "AWS_REGION variable or secret is required."; exit 1; }
          test -n "${ECR_REPOSITORY}" || { echo "ECR_REPOSITORY variable or secret is required."; exit 1; }
          test -n "${EKS_CLUSTER_NAME}" || { echo "EKS_CLUSTER_NAME variable or secret is required."; exit 1; }
          test -n "${DATABASE_URL}" || { echo "DATABASE_URL secret is required."; exit 1; }
          test -n "${LLM_API_KEY}" || { echo "LLM_API_KEY secret is required for external Groq LLM."; exit 1; }
          test -n "${SMTP_HOST}" || { echo "SMTP_HOST secret is required."; exit 1; }
          test -n "${SMTP_USERNAME}" || { echo "SMTP_USERNAME secret is required."; exit 1; }
          test -n "${SMTP_PASSWORD}" || { echo "SMTP_PASSWORD secret is required."; exit 1; }
          test -n "${SMTP_FROM}" || { echo "SMTP_FROM secret is required."; exit 1; }
          test -n "${OPS_REPORT_EMAIL_RECIPIENTS}" || { echo "OPS_REPORT_EMAIL_RECIPIENTS secret is required."; exit 1; }
          test -n "${RCA_SLACK_WEBHOOK_URL}" || { echo "RCA_SLACK_WEBHOOK_URL secret is required."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "${GITHUB_ENV}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Apply base manifests
        run: |
          kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl delete clusterrolebinding mcp-aiops-backend-readonly --ignore-not-found
          kubectl delete clusterrole mcp-aiops-backend-readonly --ignore-not-found
          for manifest in serviceaccount rbac configmap service; do
            sed "s|namespace: default|namespace: ${K8S_NAMESPACE}|g" "infra/k8s/${manifest}.yaml" | kubectl apply -f -
          done

      - name: Apply runtime secret
        run: |
          kubectl create secret generic "${K8S_SECRET_NAME}" \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=LLM_API_KEY="${LLM_API_KEY}" \
            --from-literal=ONPREM_KUBERNETES_BEARER_TOKEN="${ONPREM_KUBERNETES_BEARER_TOKEN}" \
            --from-literal=ONPREM_KUBERNETES_CA_CERT="${ONPREM_KUBERNETES_CA_CERT}" \
            --from-literal=ELASTICSEARCH_USERNAME="${ELASTICSEARCH_USERNAME}" \
            --from-literal=ELASTICSEARCH_PASSWORD="${ELASTICSEARCH_PASSWORD}" \
            --from-literal=SMTP_HOST="${SMTP_HOST}" \
            --from-literal=SMTP_USERNAME="${SMTP_USERNAME}" \
            --from-literal=SMTP_PASSWORD="${SMTP_PASSWORD}" \
            --from-literal=SMTP_FROM="${SMTP_FROM}" \
            --from-literal=OPS_REPORT_EMAIL_RECIPIENTS="${OPS_REPORT_EMAIL_RECIPIENTS}" \
            --from-literal=RCA_EMAIL_RECIPIENTS="${RCA_EMAIL_RECIPIENTS}" \
            --from-literal=RCA_SLACK_WEBHOOK_URL="${RCA_SLACK_WEBHOOK_URL}" \
            --dry-run=client -o yaml | kubectl apply -f -
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ONPREM_KUBERNETES_BEARER_TOKEN: ${{ secrets.ONPREM_KUBERNETES_BEARER_TOKEN }}
          ONPREM_KUBERNETES_CA_CERT: ${{ secrets.ONPREM_KUBERNETES_CA_CERT }}
          ELASTICSEARCH_USERNAME: ${{ secrets.ELASTICSEARCH_USERNAME }}
          ELASTICSEARCH_PASSWORD: ${{ secrets.ELASTICSEARCH_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPS_REPORT_EMAIL_RECIPIENTS: ${{ secrets.OPS_REPORT_EMAIL_RECIPIENTS }}
          RCA_EMAIL_RECIPIENTS: ${{ secrets.RCA_EMAIL_RECIPIENTS }}
          RCA_SLACK_WEBHOOK_URL: ${{ secrets.RCA_SLACK_WEBHOOK_URL }}

      - name: Deploy image
        run: |
          sed \
            -e "s|REPLACE_IMAGE|${IMAGE_URI}|g" \
            -e "s|namespace: default|namespace: ${K8S_NAMESPACE}|g" \
            -e "s|name: mcp-aiops-backend-secret|name: ${K8S_SECRET_NAME}|g" \
            infra/k8s/deployment.yaml | kubectl apply -f -
          kubectl delete cronjob mcp-aiops-rca-due-job-runner \
            --namespace "${K8S_NAMESPACE}" \
            --ignore-not-found
          kubectl rollout status "deployment/${K8S_DEPLOYMENT}" \
            --namespace "${K8S_NAMESPACE}" \
            --timeout=180s

      - name: Smoke test service
        run: |
          kubectl run mcp-aiops-smoke-test \
            --namespace "${K8S_NAMESPACE}" \
            --image=curlimages/curl:8.8.0 \
            --restart=Never \
            --rm -i \
            --command -- curl -fsS "http://${K8S_SERVICE}/health"
